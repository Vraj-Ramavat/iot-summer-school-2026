name: IoT Code Quality & File Counter

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Count .ino Files
      run: python .github/workflows/count_ino.py
